name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install pyflakes

      - name: Check syntax
        run: python3 -c "import ast; ast.parse(open('warp_gui.py').read())"

      - name: Run pyflakes
        run: pyflakes warp_gui.py
