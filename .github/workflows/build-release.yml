name: Build and Release AppImage

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
          pip install pyinstaller

      - name: Build standalone binary
        run: pyinstaller --onefile --name warp-gui --log-level WARN warp_gui.py

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/48x48/apps

          cp dist/warp-gui AppDir/usr/bin/

          python3 tools/gen_icon.py \
              AppDir/usr/share/icons/hicolor/48x48/apps/warp-vpn.png

          # Desktop entry (adapted from repo root)
          sed 's|Exec=.*|Exec=warp-gui|; s|Icon=.*|Icon=warp-vpn|' \
              warp-vpn.desktop > AppDir/usr/share/applications/warp-vpn.desktop
          cp AppDir/usr/share/applications/warp-vpn.desktop AppDir/
          cp AppDir/usr/share/icons/hicolor/48x48/apps/warp-vpn.png AppDir/

          # AppRun
          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "$0")")"\nexec "$HERE/usr/bin/warp-gui" "$@"\n' \
              > AppDir/AppRun
          chmod +x AppDir/AppRun

          # Download appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

          ARCH=x86_64 /tmp/appimagetool AppDir Cloudflare_WARP_VPN-x86_64.AppImage

      - name: Upload AppImage to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: Cloudflare_WARP_VPN-x86_64.AppImage
          tag: ${{ github.ref }}
          overwrite: true
