name: Build and Release Artifacts

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk dpkg-dev
          pip install pyinstaller

      - name: Resolve release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION// /}"
          if [ -z "$VERSION" ]; then
            echo "Tag name must include a version (example: v1.2.3)." >&2
            exit 1
          fi
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build standalone binary
        run: pyinstaller --onefile --name warp-gui --log-level WARN warp_gui.py

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/48x48/apps

          cp dist/warp-gui AppDir/usr/bin/

          python3 tools/gen_icon.py \
              AppDir/usr/share/icons/hicolor/48x48/apps/warp-vpn.png

          # Desktop entry (adapted from repo root)
          sed 's|Exec=.*|Exec=warp-gui|; s|Icon=.*|Icon=warp-vpn|' \
              warp-vpn.desktop > AppDir/usr/share/applications/warp-vpn.desktop
          cp AppDir/usr/share/applications/warp-vpn.desktop AppDir/
          cp AppDir/usr/share/icons/hicolor/48x48/apps/warp-vpn.png AppDir/

          # AppRun
          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "$0")")"\nexec "$HERE/usr/bin/warp-gui" "$@"\n' \
              > AppDir/AppRun
          chmod +x AppDir/AppRun

          # Download appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

          ARCH=x86_64 /tmp/appimagetool AppDir Cloudflare_WARP_VPN-x86_64.AppImage

      - name: Build Debian package
        run: |
          ./tools/build_deb.sh "$RELEASE_VERSION" \
            "dist/cloudflare-warp-vpn-gui_${RELEASE_VERSION}_amd64.deb"

      - name: Build source archive
        run: |
          git archive --format=tar.gz \
            --prefix="warp-vpn-gui-${RELEASE_VERSION}/" \
            -o "warp-vpn-gui-${RELEASE_VERSION}.tar.gz" \
            "$GITHUB_SHA"

      - name: Upload AppImage to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: Cloudflare_WARP_VPN-x86_64.AppImage
          tag: ${{ github.ref }}
          overwrite: true

      - name: Upload Debian package to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/cloudflare-warp-vpn-gui_${{ env.RELEASE_VERSION }}_amd64.deb
          tag: ${{ github.ref }}
          overwrite: true

      - name: Upload source archive to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: warp-vpn-gui-${{ env.RELEASE_VERSION }}.tar.gz
          tag: ${{ github.ref }}
          overwrite: true
